<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result - MCQ Exam</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <span class="brand-icon">📘</span>
        <span class="brand-text">MCQ Exam</span>
      </div>
      <div class="nav-links">
        <a href="index.html">🏠 Home</a>
        <a href="materials.html">📎 Study Materials</a>
        <a href="myresults.html">📊 My Results</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggleBtn" title="Toggle dark/light mode">🌙</button>
      </div>
    </div>
  </nav>

  <main style="max-width:800px;margin:40px auto;padding:0 20px;">
    <div style="background:var(--card-bg);border-radius:var(--radius);padding:40px;border:1px solid var(--border);text-align:center;">
      <h1 id="resultStatus" style="font-size:2rem;margin-bottom:4px;">🎉 Exam Completed!</h1>
      <p id="resultExamTitle" style="color:var(--text-secondary);font-size:1.1rem;"></p>

      <div style="margin:30px 0;">
        <div style="width:140px;height:140px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:800;position:relative;background:conic-gradient(var(--primary) 0%, var(--border) 0%);">
          <span id="resultPercentage" style="z-index:1;color:var(--text-primary);">0%</span>
          <div style="position:absolute;width:110px;height:110px;background:white;border-radius:50%;"></div>
        </div>
        <div style="margin-top:12px;font-size:1.1rem;">
          Score: <strong id="resultScore" style="color:var(--primary);font-size:1.6rem;">0</strong>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:24px 0;">
        <div style="background:var(--bg);padding:14px;border-radius:8px;">
          <div style="font-size:1.4rem;font-weight:700;color:var(--success);" id="resultCorrect">0</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">✅ Correct</div>
        </div>
        <div style="background:var(--bg);padding:14px;border-radius:8px;">
          <div style="font-size:1.4rem;font-weight:700;color:var(--danger);" id="resultWrong">0</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">❌ Wrong</div>
        </div>
        <div style="background:var(--bg);padding:14px;border-radius:8px;">
          <div style="font-size:1.4rem;font-weight:700;color:var(--text-muted);" id="resultSkipped">0</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">⏭️ Skipped</div>
        </div>
        <div style="background:var(--bg);padding:14px;border-radius:8px;">
          <div style="font-size:1.4rem;font-weight:700;color:var(--text-primary);" id="resultTime">0</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">⏱️ Time</div>
        </div>
      </div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;" class="no-print">
        <button onclick="window.location.href='index.html'" class="btn btn-primary">🏠 Home</button>
        <button id="reviewResultBtn" class="btn btn-outline">📋 Review Answers</button>
        <button onclick="window.print()" class="btn btn-outline">🖨️ Print / Save as PDF</button>
      </div>
    </div>

    <div id="reviewSection" style="display:none;margin-top:30px;">
      <h2 style="margin-bottom:16px;">📋 Review Answers</h2>
      <div id="reviewList"></div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const resultData = sessionStorage.getItem('examResult');
      if (!resultData) {
        window.location.href = 'index.html';
        return;
      }

      const result = JSON.parse(resultData);

      const displayScore = Math.max(0, result.score);
      const displayPct = Math.min(100, Math.max(0, parseFloat(result.percentage)));

      document.getElementById('resultExamTitle').textContent = result.examTitle || 'Exam';
      document.getElementById('resultCorrect').textContent = result.correct;
      document.getElementById('resultWrong').textContent = result.wrong;
      document.getElementById('resultSkipped').textContent = result.unanswered;
      document.getElementById('resultScore').textContent = displayScore.toFixed(1);
      document.getElementById('resultPercentage').textContent = displayPct.toFixed(1) + '%';
      document.getElementById('resultTime').textContent = Math.floor(result.timeTaken / 60) + 'm ' + (result.timeTaken % 60) + 's';

      const pct = displayPct;
      const circle = document.querySelector('div[style*="conic-gradient"]');
      if (circle) {
        circle.style.background = `conic-gradient(var(--primary) ${pct}%, var(--border) ${pct}%)`;
      }

      const status = document.getElementById('resultStatus');
      if (pct >= 70) { status.textContent = '🎉 Excellent!'; launchConfetti(); }
      else if (pct >= 50) status.textContent = '👍 Good Job!';
      else if (pct >= 30) status.textContent = '📚 Keep Practicing!';
      else status.textContent = '💪 Don\'t Give Up!';

      document.getElementById('reviewResultBtn').addEventListener('click', function() {
        const section = document.getElementById('reviewSection');
        if (section.style.display === 'none') {
          section.style.display = 'block';
          buildReview(result);
          this.textContent = '🙈 Hide Review';
        } else {
          section.style.display = 'none';
          this.textContent = '📋 Review Answers';
        }
      });
    });

    // ===== Confetti celebration (lightweight, no dependencies) =====
    function launchConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#4f46e5', '#16a34a', '#f59e0b', '#dc2626', '#7c3aed'];
      const pieces = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.5,
        size: 6 + Math.random() * 6,
        speedY: 2 + Math.random() * 3,
        speedX: (Math.random() - 0.5) * 2,
        rotation: Math.random() * 360,
        spin: (Math.random() - 0.5) * 10,
        color: colors[Math.floor(Math.random() * colors.length)]
      }));

      let frame = 0;
      const maxFrames = 240; // ~4 seconds at 60fps

      function draw() {
        frame++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.spin;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.rotation * Math.PI) / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
          ctx.restore();
        });
        if (frame < maxFrames) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      requestAnimationFrame(draw);
    }

    function buildReview(result) {
      const container = document.getElementById('reviewList');
      // Use the exact question order the user was shown (saved at submit time),
      // so review always matches their actual answers correctly.
      const questions = result.questions || [];
      if (questions.length === 0) return;

      const letters = ['A', 'B', 'C', 'D'];
      container.innerHTML = questions.map((q, i) => {
        const userAns = result.userAnswers[i];
        const isCorrect = userAns === q.answer;
        const isSkipped = userAns === null || userAns === undefined;
        const tag = isSkipped ? '⏭️ Skipped' : isCorrect ? '✅ Correct' : '❌ Wrong';
        const tagClass = isSkipped ? 'skipped' : isCorrect ? 'correct' : 'wrong';

        return `
          <div style="background:var(--card-bg);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;border:1px solid var(--border);">
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;">
              <span>Question ${i + 1}</span>
              <span class="review-tag ${tagClass}">${tag}</span>
            </div>
            <h4 style="margin-bottom:10px;">${q.question}</h4>
            <div style="display:flex;flex-direction:column;gap:4px;">
              ${q.options.map((opt, oi) => {
                let cls = 'option locked';
                if (oi === q.answer) cls += ' correct-answer';
                if (oi === userAns && oi !== q.answer) cls += ' wrong-answer';
                return `
                  <div class="${cls}" style="padding:8px 12px;font-size:0.9rem;">
                    ${letters[oi]}. ${opt}
                    ${oi === q.answer ? ' ✅' : ''}
                    ${oi === userAns && oi !== q.answer ? ' ❌' : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
