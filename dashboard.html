<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MCQ Exam</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <span class="brand-icon">📊</span>
        <span class="brand-text">Dashboard</span>
      </div>
      <div class="nav-links">
        <a href="index.html">🏠 Home</a>
        <a href="#" id="dashExamsLink">📚 Exams</a>
      </div>
      <div class="nav-actions">
        <span style="font-size:0.85rem;color:var(--text-secondary);" id="dashUserDisplay">User</span>
        <button onclick="logoutUser();window.location.href='index.html';" class="btn btn-danger btn-sm">🚪 Logout</button>
      </div>
    </div>
  </nav>

  <main style="max-width:1100px;margin:24px auto;padding:0 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
      <h1 id="dashName" style="font-size:1.6rem;">Welcome, User!</h1>
      <span style="color:var(--text-secondary);" id="dashEmail">user@email.com</span>
    </div>

    <div class="dash-grid">
      <div class="dash-card">
        <div class="number" id="statExams">0</div>
        <div class="label">📋 Exams Taken</div>
      </div>
      <div class="dash-card">
        <div class="number" id="statHighest">0</div>
        <div class="label">🏆 Highest Score</div>
      </div>
      <div class="dash-card">
        <div class="number" id="statAverage">0</div>
        <div class="label">📊 Average Score</div>
      </div>
      <div class="dash-card" style="background:var(--primary);color:white;">
        <div class="number" style="color:white;" id="statRank">-</div>
        <div class="label" style="color:rgba(255,255,255,0.8);">👑 Rank</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <div class="dash-section">
        <h3>📜 Exam History</h3>
        <div id="historyList"><div class="no-history">No exams taken yet.</div></div>
      </div>
      <div class="dash-section" id="leaderboard">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboardList"><div class="no-history">No data available.</div></div>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const user = getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      document.getElementById('dashUserDisplay').textContent = user.name;
      loadDashboard();
      
      document.getElementById('dashExamsLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'index.html#examsSection';
      });
    });
  </script>
</body>
</html>
