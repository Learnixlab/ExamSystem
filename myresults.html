<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Results - MCQ Exam</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <span class="brand-icon">📘</span>
        <span class="brand-text">MCQ Exam</span>
      </div>
      <div class="nav-links">
        <a href="index.html">🏠 Home</a>
        <a href="materials.html">📎 Study Materials</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggleBtn" title="Toggle dark/light mode">🌙</button>
      </div>
    </div>
  </nav>

  <main style="max-width:900px;margin:24px auto;padding:0 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2>📊 My Results</h2>
      <span style="color:var(--text-secondary);font-size:0.85rem;">এই ব্রাউজারে সেভ থাকা সব ফলাফল (অন্য ডিভাইসে দেখা যাবে না)</span>
    </div>

    <div class="dash-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:20px;">
      <div class="dash-card">
        <div class="number" id="mrCount">0</div>
        <div class="label">📋 Exams Taken</div>
      </div>
      <div class="dash-card">
        <div class="number" id="mrAvg">0%</div>
        <div class="label">📊 Average Score</div>
      </div>
      <div class="dash-card">
        <div class="number" id="mrBest">0%</div>
        <div class="label">🏆 Best Score</div>
      </div>
    </div>

    <div id="mrList"></div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/exam.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const results = getAllStoredResults();
      const list = document.getElementById('mrList');

      document.getElementById('mrCount').textContent = results.length;
      if (results.length > 0) {
        const pcts = results.map(r => parseFloat(r.percentage) || 0);
        const avg = pcts.reduce((a, b) => a + b, 0) / pcts.length;
        document.getElementById('mrAvg').textContent = avg.toFixed(1) + '%';
        document.getElementById('mrBest').textContent = Math.max(...pcts).toFixed(1) + '%';
      }

      if (results.length === 0) {
        list.innerHTML = `<div class="no-history">📭 এখনও কোনো exam সম্পূর্ণ করা হয়নি। <a href="index.html" style="color:var(--primary);font-weight:600;">এখনই একটা exam দিন →</a></div>`;
        return;
      }

      list.innerHTML = results.map(r => {
        const pct = Math.min(100, Math.max(0, parseFloat(r.percentage) || 0));
        const badgeClass = pct >= 70 ? 'badge-pass' : pct >= 40 ? 'badge-average' : 'badge-fail';
        const date = r.completedAt ? new Date(r.completedAt).toLocaleString() : '';
        return `
          <div class="myresults-item">
            <div>
              <div class="mr-title">${r.examTitle || 'Exam'}</div>
              <div class="mr-meta">✅ ${r.correct} correct · ❌ ${r.wrong} wrong · ⏭️ ${r.unanswered} skipped · ${date}</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="badge ${badgeClass}">${pct.toFixed(1)}%</span>
              <button class="btn btn-outline btn-sm" onclick="viewStoredResult('${r.examId}')">📋 View</button>
            </div>
          </div>
        `;
      }).join('');
    });
  </script>
</body>
</html>
