<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam - MCQ System</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <span class="brand-icon">📘</span>
        <span class="brand-text">MCQ Exam</span>
      </div>
      <div class="nav-links">
        <a href="index.html">🏠 Home</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggleBtn" title="Toggle dark/light mode">🌙</button>
        <div class="timer-box" style="background:var(--warning-light);color:#92400e;padding:6px 16px;border-radius:30px;font-weight:700;">
          ⏱ <span id="timerDisplay">00:00</span>
        </div>
      </div>
    </div>
  </nav>

  <main style="max-width:900px;margin:24px auto;padding:0 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2 id="examTitle">Loading...</h2>
      <span style="color:var(--text-secondary);">Questions: <span id="examTotal">0</span></span>
    </div>

    <div id="resumeBanner" class="autosave-banner" style="display:none;">
      💾 <span>আগের সেশন থেকে আপনার উত্তর ও সময় পুনরুদ্ধার করা হয়েছে (auto-saved)।</span>
    </div>

    <div style="display:flex;gap:24px;flex-wrap:wrap;">
      <aside style="flex:0 0 200px;background:var(--card-bg);border-radius:var(--radius);padding:16px;border:1px solid var(--border);height:fit-content;">
        <h3 style="font-size:0.85rem;margin-bottom:10px;">Questions</h3>
        <div id="questionGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;font-size:0.75rem;color:var(--text-muted);flex-wrap:wrap;">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--success);"></span> Answered</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--border);"></span> Unanswered</span>
          <span>🚩 Flagged</span>
        </div>
        <button id="submitBtn" class="btn btn-danger" style="width:100%;margin-top:10px;">📤 Submit</button>
      </aside>

      <main style="flex:1;min-width:0;">
        <div style="background:var(--border);height:6px;border-radius:4px;overflow:hidden;margin-bottom:16px;">
          <div id="progressBar" style="height:100%;background:var(--primary);width:0%;transition:width 0.3s;"></div>
        </div>

        <div style="background:var(--card-bg);border-radius:var(--radius);padding:24px;border:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;color:var(--text-secondary);font-size:0.9rem;margin-bottom:8px;">
            <span id="qNumber">Question 1</span>
            <span id="qTotal">of 0</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:20px;">
            <h3 id="qText" style="font-size:1.15rem;">Loading question...</h3>
            <button id="flagBtn" class="flag-btn" title="Mark this question to review later">🚩 Flag</button>
          </div>
          <div id="optionsContainer" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
          <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <button id="prevBtn" class="btn btn-secondary" disabled>◀ Previous</button>
            <button id="nextBtn" class="btn btn-primary">Next →</button>
          </div>
        </div>
      </main>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/exam.js"></script>
  <script>
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
